<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - MOOVA Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
     
</head>
<body>
<div class="login-wrap">
    <div class="login-card">

        <div class="login-logo">
            <img src="{{ url_for('static', filename='image.png') }}" alt="MOOVA Clinic">
            <div class="logo">MOOVA <span>Clinic</span></div>
            <p>Portal de acceso al personal</p>
        </div>

        <script src="https://www.google.com/recaptcha/api.js" async defer></script>
        <div class="g-recaptcha" data-sitekey="{{ site_key }}"></div>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                <div class="alerta error">
                    <i class="fas fa-exclamation-circle"></i> {{ msg }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="login-form">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo</label>
                <input type="email" name="correo" placeholder="tu@correo.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <div class="input-password">
                    <input type="password" name="clave" id="clave" placeholder="••••••••" required>
                    <button type="button" class="toggle-pass" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-ingresar">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>

        <div class="login-footer">
            <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
        </div>

    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('clave');
        const icon  = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
